# ============================================
# Nginx-Konfiguration fuer Matomo (FPM)
# ============================================
# Quelle/Vorbild: https://github.com/matomo-org/matomo-nginx
# Service-Name des FPM-Containers: "matomo" (siehe docker-compose.matomo.yml)
# ============================================

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php;

    # Sicherheits-Header
    add_header Referrer-Policy origin always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # Tracker- und JS-Endpunkte (matomo.php, piwik.php = Legacy)
    location ~ ^/(matomo\.php|piwik\.php|ppms\.php) {
        include fastcgi_params;
        try_files $fastcgi_script_name =404;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_pass matomo:9000;
    }

    # Statische Assets — lange Caches
    location ~* \.(gif|ico|jpg|png|svg|js|css|htm|html|mp3|mp4|wav|ogg|avi|ttf|eot|woff|woff2|json)$ {
        expires 365d;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }

    # Sensible Verzeichnisse vollstaendig sperren
    location ~ ^/(config|tmp|core|lang) {
        deny all;
        return 403;
    }

    # .ht-Dateien sperren
    location ~ /\.ht {
        deny all;
        return 403;
    }

    # README, LICENSE etc.
    location ~ ^/(README|LEGALNOTICE|LICENSE|CONTRIBUTING)\.md$ {
        deny all;
        return 403;
    }

    # Alle anderen PHP-Files
    location ~* \.php$ {
        include fastcgi_params;
        try_files $fastcgi_script_name =404;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_pass matomo:9000;
    }

    # Fallback
    location / {
        try_files $uri $uri/ =404;
    }

    # Upload-Limit fuer Plugin-Installationen
    client_max_body_size 100M;
}
