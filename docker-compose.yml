version: '3.8'

# ACHTUNG: "docker compose down -v" loescht ALLE Volumes inkl. Datenbank!
# Nutze "docker compose down" (ohne -v) um Daten zu behalten.
# Backups: ./docker/scripts/backup.sh

services:
  # ============================================
  # Next.js Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: development
    container_name: xkmu-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://xkmu:${DB_PASSWORD:-xkmu_dev_password}@postgres:5432/xkmu_business_os
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_production_min_32_chars}
      - APPOINTMENT_TOKEN_SECRET=${APPOINTMENT_TOKEN_SECRET:-dev_appointment_token_secret_change_in_production_min_32}
      - VOICE_WEBHOOK_SECRET=${VOICE_WEBHOOK_SECRET:-}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}
      # AI Provider Keys werden jetzt ueber die Datenbank verwaltet (Einstellungen > Integrations)
      - OLLAMA_BASE_URL=http://ollama:11434
      # Social Media (Meta OAuth: Facebook + Instagram)
      - META_APP_ID=${META_APP_ID:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - META_OAUTH_REDIRECT_URI=${META_OAUTH_REDIRECT_URI:-}
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      - INSTAGRAM_OAUTH_REDIRECT_URI=${INSTAGRAM_OAUTH_REDIRECT_URI:-}
      - X_CLIENT_ID=${X_CLIENT_ID:-}
      - X_CLIENT_SECRET=${X_CLIENT_SECRET:-}
      - X_OAUTH_REDIRECT_URI=${X_OAUTH_REDIRECT_URI:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - LINKEDIN_OAUTH_REDIRECT_URI=${LINKEDIN_OAUTH_REDIRECT_URI:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-xkmu_redis_dev_2024}@redis:6379
      # Mirofish (Businessplan-Simulation)
      - MIROFISH_BASE_URL=${MIROFISH_BASE_URL:-http://mirofish:5001}
      # Schema-Sync- + Seed-Check-Gates (greifen nur in der prod-Stage via
      # entrypoint.prod.sh — im dev-Stage ohne Effekt, hier nur fuer Symmetrie).
      - BACKUP_ENABLED=${BACKUP_ENABLED:-false}
      - FORCE_SCHEMA_SYNC=${FORCE_SCHEMA_SYNC:-false}
      - FORCE_SEED_CHECK=${FORCE_SEED_CHECK:-false}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xkmu-network

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: xkmu-postgres
    environment:
      POSTGRES_USER: xkmu
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xkmu_dev_password}
      POSTGRES_DB: xkmu_business_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xkmu -d xkmu_business_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xkmu-network

  # ============================================
  # Ollama (Local AI)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: xkmu-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - xkmu-network
    # GPU support (uncomment if NVIDIA GPU available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ============================================
  # Redis (Session Cache)
  # ============================================
  redis:
    image: redis:8-alpine
    container_name: xkmu-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-xkmu_redis_dev_2024}
    networks:
      - xkmu-network

  # ============================================
  # Mirofish (KI-Simulationstool fuer Businessplan-Pipeline)
  # ============================================
  # Externes AGPL-Tool, das auf eine natuerlichsprachliche Frage +
  # seed materials (Plan als Markdown) einen Simulationsbericht zurueck
  # liefert. Wir sprechen nur das Backend (5001) an; das mitgelieferte
  # Frontend (3000) wird NICHT auf den Host gemappt — wir haben eigene UI.
  #
  # AGPL-Compliance: laeuft als separater Prozess, kommuniziert via HTTP.
  # Solange wir den Mirofish-Code nicht modifizieren, infiziert die Lizenz
  # unseren Stack nicht (kein Linking).
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    container_name: xkmu-mirofish
    restart: unless-stopped
    environment:
      - LLM_API_KEY=${MIROFISH_LLM_API_KEY:-}
      - LLM_BASE_URL=${MIROFISH_LLM_BASE_URL:-}
      - LLM_MODEL_NAME=${MIROFISH_LLM_MODEL:-gpt-4o-mini}
      - ZEP_API_KEY=${MIROFISH_ZEP_API_KEY:-}
    ports:
      # nur Backend; Frontend-Port 3000 absichtlich nicht gemappt
      - "127.0.0.1:5001:5001"
    volumes:
      - mirofish_uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5001/health || curl -fs http://localhost:5001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - xkmu-network

networks:
  xkmu-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  redis_data:
  db_backups:
  mirofish_uploads:
