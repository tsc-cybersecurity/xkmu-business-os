# ============================================
# xKMU Business OS - Coolify Deployment
# ============================================
# This file is optimized for Coolify deployment.
#
# In Coolify:
# 1. Create new project > Docker Compose
# 2. Point to this repository
# 3. Set docker-compose file: docker-compose.coolify.yml
# 4. Set Domains for app: https://boss.xkmu.de (KEIN Port!)
# 5. Set Domains for pgadmin: https://boss-db.xkmu.de
# 6. Configure environment variables in Coolify UI
# 7. Deploy!
#
# Required Environment Variables (set in Coolify):
# - DB_PASSWORD: Strong database password
# - JWT_SECRET: Min 32 character secret for auth
# - NEXT_PUBLIC_APP_URL: https://boss.xkmu.de
#
# Optional Environment Variables:
# - GOOGLE_AI_API_KEY: For Gemini AI
# - OPENAI_API_KEY: For OpenAI
# - SMTP_* variables for email
# - PGADMIN_EMAIL: pgAdmin login email (default: admin@example.com)
# - PGADMIN_PASSWORD: pgAdmin login password (default: admin123)
# ============================================

services:
  # ============================================
  # Next.js Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
    restart: always
    expose:
      - "3000"
    extra_hosts:
      # NAT-Hairpinning fix: interne Services über Domain erreichbar machen
      - "n8n.xkmu.de:host-gateway"
      - "boss.xkmu.de:host-gateway"
    labels:
      # Coolify generiert automatisch Traefik-Router-Labels, aber NICHT den
      # loadbalancer.server.port. Ohne dieses Label weiss Traefik nicht auf
      # welchem Port der Container lauscht -> Bad Gateway.
      # Diese Labels werden von Coolify ZUSAETZLICH zu den generierten uebernommen.
      - "traefik.http.services.xkmu-app.loadbalancer.server.port=3000"
    environment:
      - NODE_ENV=production
      - COOLIFY=true
      - DATABASE_URL=postgresql://xkmu:${DB_PASSWORD}@postgres:5432/xkmu_business_os
      - DATABASE_SSL=false
      - JWT_SECRET=${JWT_SECRET}
      - APPOINTMENT_TOKEN_SECRET=${APPOINTMENT_TOKEN_SECRET:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://boss.xkmu.de}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}
      # AI Providers (optional - configure in app settings or here)
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Ollama (optional - only if you want local AI)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      # Social Media (Meta OAuth: Facebook + Instagram)
      - META_APP_ID=${META_APP_ID:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - META_OAUTH_REDIRECT_URI=${META_OAUTH_REDIRECT_URI:-}
      # Redis for session caching
      - REDIS_URL=redis://:${REDIS_PASSWORD:-xkmu_redis_secret_2024}@redis:6379
      # Next.js standalone binds to HOSTNAME; Docker sets it to container ID.
      - HOSTNAME=0.0.0.0
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - app_data:/app/data
      - db_backups:/backups
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # NOTE: No Docker healthcheck here - Coolify/Traefik handles health monitoring.
    # A Docker healthcheck that marks the container "unhealthy" causes Traefik
    # to return 503 "no available server" and refuse to route traffic.

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    restart: always
    networks:
      - backend
    environment:
      POSTGRES_USER: xkmu
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: xkmu_business_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xkmu -d xkmu_business_os"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Redis (Session Cache) - internal only, not exposed to host/internet
  # ============================================
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-xkmu_redis_secret_2024} --bind 0.0.0.0 --protected-mode yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-xkmu_redis_secret_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  # ============================================
  # pgAdmin 4 (Datenbank-Verwaltung)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    expose:
      - "80"
    labels:
      - "traefik.http.services.xkmu-pgadmin.loadbalancer.server.port=80"
    networks:
      - backend
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

networks:
  backend:
    internal: true

volumes:
  postgres_data:
  redis_data:
  db_backups:
  pgadmin_data:
  app_data:
