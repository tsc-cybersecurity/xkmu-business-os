name: Release (Version Bump + Docker Build)

# Vereinheitlichter Release-Workflow:
#   1. Patch-Version in package.json bumpen + committen + pushen
#   2. Production-Image mit der neuen Version-Tag bauen und nach GHCR pushen
#
# Coolify/Server pullen anschliessend das fertige Image (kein Server-Build) -> Rolling Deploy.
# Tags: latest, main, sha-<7>, v<neue-version>
#
# Hinweise:
#   - Pushes via GITHUB_TOKEN triggern KEINEN weiteren Workflow (GitHub-Schutz vor
#     Endlosschleifen) — keine [skip ci]-Marker noetig.
#   - Skip-Logik fuer [skip ci]-Commits bleibt als Safety, falls jemand manuell pusht.
#   - Manuell ausloesen via "workflow_dispatch".

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.planning/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write    # fuer Version-Bump-Commit
  packages: write    # fuer GHCR-Push

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # Releases nicht abbrechen — sonst inkonsistente bumps

jobs:
  # Job 1: Naechste Version berechnen (separater Job, damit Job 2 die
  # Version in seinem Job-Name interpolieren kann via needs.*.outputs).
  # Limitierung: run-name (= Titel der Run-Liste) wird vor den Jobs
  # ausgewertet — die berechnete Version erscheint daher nicht dort,
  # sondern als Job-Name im Run-Detail.
  compute-version:
    name: Compute next version
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      version: ${{ steps.calc.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate next patch version
        id: calc
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "Current: $CURRENT  →  New: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  # Job 2: Bump committen + pushen + Docker-Image bauen + nach GHCR pushen.
  # Job-Name nutzt die im prepare-Job berechnete Version → in der Actions-UI
  # sichtbar als "v1.5.673" sobald compute-version fertig ist.
  release:
    needs: compute-version
    name: "v${{ needs.compute-version.outputs.version }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply version bump
        run: |
          NEW_VERSION="${{ needs.compute-version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit & push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ needs.compute-version.outputs.version }} [skip ci]"
          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=v${{ needs.compute-version.outputs.version }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA-Cache fuer Layer-Reuse zwischen Runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # BuildKit cache-mounts (npm) sind im Dockerfile aktiv
          provenance: false

      - name: Job summary
        if: always()
        run: |
          echo "## 🚀 Release v${{ needs.compute-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`ghcr.io/${{ github.repository }}:v${{ needs.compute-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
