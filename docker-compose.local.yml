# ============================================
# xKMU Business OS - Docker Setup (Supabase DB)
# ============================================
# Voraussetzung: Supabase Stack laeuft separat (supabase-db Container)
#
# Starten:
#   docker compose -f docker-compose.local.yml up -d --build
#
# Stoppen:
#   docker compose -f docker-compose.local.yml down
#
# Logs:
#   docker compose -f docker-compose.local.yml logs -f app
#
# Nach dem Start erreichbar unter: http://localhost:3000
# Login: siehe SEED_ADMIN_EMAIL / SEED_ADMIN_PASSWORD in .env
# Supabase Dashboard: https://db.xkmu.de
# ============================================

services:
  # ============================================
  # Next.js Application (Production Build)
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
    container_name: xkmu-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DOCKER=true
      # Supabase PostgreSQL (external stack)
      - DATABASE_URL=postgresql://postgres:${SUPABASE_DB_PASSWORD:?SUPABASE_DB_PASSWORD must be set}@supabase-db:5432/postgres
      - DATABASE_SSL=false
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set (min 32 chars)}
      - APPOINTMENT_TOKEN_SECRET=${APPOINTMENT_TOKEN_SECRET:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://bos.dev.xkmu.de}
      # AI Providers (optional)
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - SERPAPI_KEY=${SERPAPI_KEY:-}
      # Social Media (Meta OAuth: Facebook + Instagram)
      - META_APP_ID=${META_APP_ID:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - META_OAUTH_REDIRECT_URI=${META_OAUTH_REDIRECT_URI:-}
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      - INSTAGRAM_OAUTH_REDIRECT_URI=${INSTAGRAM_OAUTH_REDIRECT_URI:-}
      - X_CLIENT_ID=${X_CLIENT_ID:-}
      - X_CLIENT_SECRET=${X_CLIENT_SECRET:-}
      - X_OAUTH_REDIRECT_URI=${X_OAUTH_REDIRECT_URI:-}
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      # Next.js
      - HOSTNAME=0.0.0.0
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # Seed admin credentials
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:?SEED_ADMIN_EMAIL must be set for initial seed}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD must be set for initial seed}
    volumes:
      - ./data/uploads:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - supabase_default
      - internal

  # ============================================
  # Redis (Session Cache)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: xkmu-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --bind 0.0.0.0 --protected-mode yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

networks:
  # Connect to Supabase's Docker network (where supabase-db lives)
  supabase_default:
    external: true
  internal:
    internal: true

volumes:
  redis_data:
