# ============================================
# xKMU Business OS - Lokales Docker Setup
# ============================================
# Einfach starten mit:
#
#   docker compose -f docker-compose.local.yml up -d --build
#
# Stoppen:
#   docker compose -f docker-compose.local.yml down
#
# Stoppen + Daten loeschen (ACHTUNG: loescht Datenbank!):
#   docker compose -f docker-compose.local.yml down -v
#   Vorher Backup erstellen: ./docker/scripts/backup.sh
#
# Logs anzeigen:
#   docker compose -f docker-compose.local.yml logs -f app
#
# Nach dem Start erreichbar unter: http://localhost:3000
# Standard-Login: admin@example.com / admin123
# ============================================

services:
  # ============================================
  # Next.js Application (Production Build)
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
    container_name: xkmu-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DOCKER=true
      - DATABASE_URL=postgresql://xkmu:${DB_PASSWORD:-xkmu_local_2024}@postgres:5432/xkmu_business_os
      - DATABASE_SSL=false
      - JWT_SECRET=${JWT_SECRET:-local_dev_jwt_secret_min_32_chars_change_me}
      - NEXT_PUBLIC_APP_URL=http://localhost:${APP_PORT:-3000}
      # AI Providers (optional)
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      # Redis
      - REDIS_URL=redis://redis:6379
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - ./data/uploads:/app/data
      - db_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - xkmu-network

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: xkmu-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: xkmu
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xkmu_local_2024}
      POSTGRES_DB: xkmu_business_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xkmu -d xkmu_business_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xkmu-network

  # ============================================
  # Redis (Session Cache)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: xkmu-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - xkmu-network

  # ============================================
  # pgAdmin 4 (Datenbank-Verwaltung)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: xkmu-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xkmu-network

networks:
  xkmu-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  db_backups:
  pgadmin_data:
