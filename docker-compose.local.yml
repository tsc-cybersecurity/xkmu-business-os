# ============================================
# xKMU Business OS - Docker Setup (Supabase DB)
# ============================================
# Voraussetzung: Supabase Stack laeuft separat (supabase-db Container)
#
# Empfohlener Deploy (Pre-built Image, ~5-10s Downtime):
#   APP_IMAGE=ghcr.io/tsc-cybersecurity/xkmu-business-os:latest \
#     docker compose -f docker-compose.local.yml pull
#   APP_IMAGE=ghcr.io/tsc-cybersecurity/xkmu-business-os:latest \
#     docker compose -f docker-compose.local.yml up -d
#
#   Oder bequemer ueber das mitgelieferte Skript:
#   ./scripts/deploy.sh
#
# Lokaler Build (~3+ Min Downtime — nur Notfall/Erstinbetriebnahme):
#   docker compose -f docker-compose.local.yml up -d --build
#
# Stoppen:
#   docker compose -f docker-compose.local.yml down
#
# Logs:
#   docker compose -f docker-compose.local.yml logs -f app
#
# Nach dem Start erreichbar unter: http://localhost:3000 (oder via NPM-Domain)
# Login: siehe SEED_ADMIN_EMAIL / SEED_ADMIN_PASSWORD in .env
# Supabase Dashboard: https://db.xkmu.de
# ============================================

services:
  # ============================================
  # Next.js Application (Production Build)
  # ============================================
  app:
    # Pre-built Image bevorzugt — kein Build mehr auf dem Server.
    # APP_IMAGE in .env oder per Shell setzen, z.B.:
    #   APP_IMAGE=ghcr.io/tsc-cybersecurity/xkmu-business-os:latest
    image: ${APP_IMAGE:-xkmu-business-os:local}
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
    container_name: xkmu-app
    restart: unless-stopped
    # Label opt-in fuer Watchtower — nur dieser Container wird auto-aktualisiert,
    # nicht z.B. Redis (das brauchen wir versionspinned).
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DOCKER=true
      # Supabase PostgreSQL (external stack)
      - DATABASE_URL=postgresql://postgres:${SUPABASE_DB_PASSWORD:?SUPABASE_DB_PASSWORD must be set}@supabase-db:5432/postgres
      - DATABASE_SSL=false
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set (min 32 chars)}
      - APPOINTMENT_TOKEN_SECRET=${APPOINTMENT_TOKEN_SECRET:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://bos.dev.xkmu.de}
      # AI Providers (optional)
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - SERPAPI_KEY=${SERPAPI_KEY:-}
      # Social Media (Meta OAuth: Facebook + Instagram)
      - META_APP_ID=${META_APP_ID:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - META_OAUTH_REDIRECT_URI=${META_OAUTH_REDIRECT_URI:-}
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      - INSTAGRAM_OAUTH_REDIRECT_URI=${INSTAGRAM_OAUTH_REDIRECT_URI:-}
      - X_CLIENT_ID=${X_CLIENT_ID:-}
      - X_CLIENT_SECRET=${X_CLIENT_SECRET:-}
      - X_OAUTH_REDIRECT_URI=${X_OAUTH_REDIRECT_URI:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - LINKEDIN_OAUTH_REDIRECT_URI=${LINKEDIN_OAUTH_REDIRECT_URI:-}
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      # Next.js
      - HOSTNAME=0.0.0.0
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # Seed admin credentials
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:?SEED_ADMIN_EMAIL must be set for initial seed}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD must be set for initial seed}
    volumes:
      - ./data/uploads:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - supabase_default
      - internal

  # ============================================
  # Redis (Session Cache)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: xkmu-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --bind 0.0.0.0 --protected-mode yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ============================================
  # Watchtower (Auto-Update fuer App-Container)
  # ============================================
  # Pollt alle 5 Min GHCR auf neue Images des app-Containers (nur per Label
  # opt-in). Bei Update: pull → stop alt → start neu. Healthcheck der App
  # sorgt dafuer, dass der NPM-Reverse-Proxy erst routet wenn ready.
  #
  # Voraussetzung: einmaliger "sudo docker login ghcr.io" auf dem Host —
  # die credentials liegen dann in /root/.docker/config.json und werden
  # readonly in den watchtower-Container gemountet.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # GHCR-Credentials vom Host (sudo docker login ghcr.io)
      - /root/.docker/config.json:/config.json:ro
    environment:
      # Nur Container mit Label com.centurylinklabs.watchtower.enable=true updaten
      - WATCHTOWER_LABEL_ENABLE=true
      # Poll-Intervall: 5 Min (300s)
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL:-300}
      # Alte Images nach erfolgreichem Update aufraeumen (kein Disk-Bloat)
      - WATCHTOWER_CLEANUP=true
      # Restarting Container nicht anfassen (verhindert Race-Conditions)
      - WATCHTOWER_INCLUDE_RESTARTING=false
      # Zeitzone fuer Logs
      - TZ=${TZ:-Europe/Berlin}

networks:
  # Connect to Supabase's Docker network (where supabase-db lives)
  supabase_default:
    external: true
  internal:
    internal: true

volumes:
  redis_data:
