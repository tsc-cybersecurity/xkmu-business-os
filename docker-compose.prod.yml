version: '3.8'

services:
  # ============================================
  # Next.js Application (Production)
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
    container_name: xkmu-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://xkmu:${DB_PASSWORD}@postgres:5432/xkmu_business_os
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379
    volumes:
      - app_uploads:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xkmu-network

  # ============================================
  # PostgreSQL Database (Production)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: xkmu-postgres
    restart: always
    environment:
      POSTGRES_USER: xkmu
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: xkmu_business_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xkmu -d xkmu_business_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xkmu-network

  # ============================================
  # Ollama (Local AI - Production)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: xkmu-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - xkmu-network

  # ============================================
  # Redis (Session Cache - Production)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: xkmu-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - xkmu-network

networks:
  xkmu-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  redis_data:
  app_uploads:
