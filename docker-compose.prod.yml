version: '3.8'

# ACHTUNG: "docker compose down -v" loescht ALLE Volumes inkl. Datenbank!
# Nutze "docker compose down" (ohne -v) um Daten zu behalten.
# Backups: ./docker/scripts/backup.sh -f docker-compose.prod.yml

services:
  # ============================================
  # Next.js Application (Production)
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
    container_name: xkmu-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://xkmu:${DB_PASSWORD}@postgres:5432/xkmu_business_os
      - JWT_SECRET=${JWT_SECRET}
      - APPOINTMENT_TOKEN_SECRET=${APPOINTMENT_TOKEN_SECRET:-}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      # Social Media (Meta OAuth: Facebook + Instagram)
      - META_APP_ID=${META_APP_ID:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - META_OAUTH_REDIRECT_URI=${META_OAUTH_REDIRECT_URI:-}
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      - INSTAGRAM_OAUTH_REDIRECT_URI=${INSTAGRAM_OAUTH_REDIRECT_URI:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-xkmu_redis_secret_2024}@redis:6379
    volumes:
      - ./data/uploads:/app/data
      - db_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xkmu-network
      - backend

  # ============================================
  # PostgreSQL Database (Production)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: xkmu-postgres
    restart: always
    networks:
      - backend
    environment:
      POSTGRES_USER: xkmu
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: xkmu_business_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xkmu -d xkmu_business_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Ollama (Local AI - Production)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: xkmu-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - xkmu-network

  # ============================================
  # Redis (Session Cache) - internal only, not exposed to host/internet
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: xkmu-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-xkmu_redis_secret_2024} --bind 0.0.0.0 --protected-mode yes
    networks:
      - backend

networks:
  xkmu-network:
    driver: bridge
  backend:
    internal: true

volumes:
  postgres_data:
  ollama_data:
  redis_data:
  db_backups:
